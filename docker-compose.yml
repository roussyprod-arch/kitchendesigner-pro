version: '3.8'

services:
  # ─────────────────────────────────────────────────────
  # MONGODB
  # ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: kitchendesigner-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: kitchenuser
      MONGO_INITDB_ROOT_PASSWORD: securepassword123
      MONGO_INITDB_DATABASE: kitchendesigner
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/init-db.js:/docker-entrypoint-initdb.d/init-db.js
    networks:
      - kitchendesigner-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kitchendesigner-redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kitchendesigner-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # BACKEND NODE.JS
  # ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kitchendesigner-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://kitchenuser:securepassword123@mongodb:27017/kitchendesigner?authSource=admin
      REDIS_URL: redis://:redispassword123@redis:6379
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend
      - ./logs:/logs
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kitchendesigner-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────
  # NGINX
  # ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: kitchendesigner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - kitchendesigner-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  kitchendesigner-network:
    driver: bridge
